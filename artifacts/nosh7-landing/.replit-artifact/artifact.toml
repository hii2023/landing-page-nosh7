kind = "web"
previewPath = "/"
title = "Nosh7 Partner Landing Page"
version = "1.0.0"
id = "artifacts/nosh7-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23019

[services.development]
run = "pnpm --filter @workspace/nosh7-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nosh7-landing", "run", "build" ]
publicDir = "artifacts/nosh7-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23019"
BASE_PATH = "/"
