<form id="partner-enquiry-form" style="max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; background-color: #f9f9f9;">
    <h2 style="text-align:center; color:#333;">Partner Enquiry Form</h2>
    <div style="margin-bottom: 15px;">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required style="width: 100%; padding: 10px;">
    </div>
    <div style="margin-bottom: 15px;">
        <label for="contact">Contact:</label>
        <input type="tel" id="contact" name="contact" required style="width: 100%; padding: 10px;">
    </div>
    <div style="margin-bottom: 15px;">
        <label for="clinic-name">Clinic Name:</label>
        <input type="text" id="clinic-name" name="clinic-name" required style="width: 100%; padding: 10px;">
    </div>
    <div style="margin-bottom: 15px;">
        <label for="notes">Notes:</label>
        <textarea id="notes" name="notes" rows="5" style="width: 100%; padding: 10px;"></textarea>
    </div>
    <button type="submit" style="background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;">Submit</button>
    <div id="form-response" style="margin-top: 15px; text-align: center;"></div>
</form>

<script>
    document.getElementById('partner-enquiry-form').onsubmit = async function(event) {
        event.preventDefault();
        let formData = new FormData(this);
        try {
            let response = await fetch('https://formsubmit.co/ajax/youremail@example.com', {
                method: 'POST',
                body: formData,
                headers: {'Accept': 'application/json'}
            });
            if (response.ok) {
                document.getElementById('form-response').innerHTML = '<p style="color:green;">Thank you for your enquiry! We will get back to you soon.</p>';
                this.reset();
            } else {
                throw new Error('Error');
            }
        } catch (error) {
            document.getElementById('form-response').innerHTML = '<p style="color:red;">There was an issue with your submission. Please try again.</p>';
        }
    };
</script> 

<style>
    input, textarea {
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    input:focus, textarea:focus {
        border-color: #007bff;
    }
</style>
